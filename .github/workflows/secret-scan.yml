name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.24.2"
          ARCHIVE="gitleaks_${VERSION}_linux_x64.tar.gz"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/${ARCHIVE}" -o /tmp/gitleaks.tar.gz
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_checksums.txt" -o /tmp/gitleaks_checksums.txt
          expected_checksum="$(awk -v file="${ARCHIVE}" '$2 == file { print $1 }' /tmp/gitleaks_checksums.txt)"
          if [ -z "$expected_checksum" ]; then
            echo "Failed to find checksum for ${ARCHIVE}" >&2
            exit 1
          fi
          echo "${expected_checksum}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run secret scan
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --no-git \
            --redact \
            --exit-code 1
