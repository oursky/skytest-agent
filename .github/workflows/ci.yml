name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Legacy cleanup denylist
        run: |
          set -euo pipefail
          banned='GCS_|object-store-gcs|fake-gcs|STORAGE_EMULATOR_HOST|STORAGE_PROVIDER=gcs|infra/helm|helm lint|helm template|kubectl|kubernetes'
          if rg -n "$banned" \
            --glob '!.git/**' \
            --glob '!docs/plans/**' \
            --glob '!**/*.png' \
            --glob '!**/*.jpg' \
            --glob '!**/*.jpeg' \
            --glob '!**/*.gif'; then
            echo "Legacy token(s) detected. Remove references before merging."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run verify

      - name: Test
        run: npm test
