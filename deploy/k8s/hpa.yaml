apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: skytest-control-plane
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: skytest-control-plane
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
