apiVersion: apps/v1
kind: Deployment
metadata:
  name: skytest-control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app: skytest-control-plane
  template:
    metadata:
      labels:
        app: skytest-control-plane
    spec:
      containers:
        - name: control-plane
          image: ghcr.io/oursky/skytest-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: skytest-agent-secrets
          command: ["npm", "run", "start", "--", "--hostname", "0.0.0.0", "--port", "3000"]
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /api/health/ready
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
