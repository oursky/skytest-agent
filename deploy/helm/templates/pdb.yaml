{{- if and .Values.controlPlane.enabled .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "skytest-agent.controlPlaneFullname" . }}
  labels:
    {{- include "skytest-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "skytest-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
{{- end }}
