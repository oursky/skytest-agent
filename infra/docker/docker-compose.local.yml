services:
  postgres:
    image: postgres:16
    container_name: skytest-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: skytest_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skytest_agent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - skytest-local-postgres:/var/lib/postgresql/data

  gcs:
    image: fsouza/fake-gcs-server:latest
    container_name: skytest-local-gcs
    restart: unless-stopped
    command: -scheme http -backend memory
    ports:
      - "4443:4443"

  create-gcs-bucket:
    image: curlimages/curl:8.16.0
    depends_on:
      gcs:
        condition: service_started
    restart: "no"
    entrypoint:
      - /bin/sh
    command:
      - -ec
      - |
        until curl -fsS http://gcs:4443/storage/v1/b >/dev/null; do
          sleep 1
        done
        status="$$(curl -sS -o /tmp/create-bucket-response.json -w '%{http_code}' \
          -X POST 'http://gcs:4443/storage/v1/b?project=skytest-local' \
          -H 'Content-Type: application/json' \
          -d '{"name":"skytest-agent"}')"
        if [ "$${status}" = "200" ] || [ "$${status}" = "409" ]; then
          exit 0
        fi
        cat /tmp/create-bucket-response.json
        exit 1

volumes:
  skytest-local-postgres:
