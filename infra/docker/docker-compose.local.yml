services:
  postgres:
    image: postgres:16
    container_name: skytest-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: skytest_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d skytest_agent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - skytest-local-postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: skytest-local-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - skytest-local-minio:/data

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    restart: "no"
    entrypoint: >-
      /bin/sh -c '
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done &&
      mc mb --ignore-existing local/skytest-agent &&
      mc anonymous set private local/skytest-agent
      '

volumes:
  skytest-local-postgres:
  skytest-local-minio:
