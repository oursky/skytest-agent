apiVersion: batch/v1
kind: CronJob
metadata:
  name: skytest-runner-maintenance
spec:
  schedule: "*/2 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: runner-maintenance
              image: ghcr.io/oursky/skytest-agent:latest
              imagePullPolicy: IfNotPresent
              envFrom:
                - secretRef:
                    name: skytest-agent-secrets
              env:
                - name: RUNNER_MAINTENANCE_ONCE
                  value: "true"
              command: ["npm", "run", "runner:maintenance"]
              resources:
                requests:
                  cpu: "100m"
                  memory: "256Mi"
                limits:
                  cpu: "500m"
                  memory: "1Gi"
