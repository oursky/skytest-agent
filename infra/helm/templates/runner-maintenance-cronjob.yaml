{{- if .Values.runnerMaintenance.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "skytest-agent.runnerMaintenanceFullname" . }}
  labels:
    {{- include "skytest-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: runner-maintenance
spec:
  schedule: {{ .Values.runnerMaintenance.schedule | quote }}
  concurrencyPolicy: {{ .Values.runnerMaintenance.concurrencyPolicy }}
  successfulJobsHistoryLimit: {{ .Values.runnerMaintenance.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.runnerMaintenance.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.runnerMaintenance.backoffLimit }}
      template:
        metadata:
          labels:
            {{- include "skytest-agent.selectorLabels" . | nindent 12 }}
            app.kubernetes.io/component: runner-maintenance
          {{- with .Values.runnerMaintenance.podAnnotations }}
          annotations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        spec:
          restartPolicy: Never
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          containers:
            - name: runner-maintenance
              image: "{{ include "skytest-agent.image" . }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              command:
                {{- toYaml .Values.runnerMaintenance.command | nindent 16 }}
              envFrom:
                - secretRef:
                    name: {{ .Values.secrets.existingSecretName }}
              env:
                - name: RUNNER_MAINTENANCE_ONCE
                  value: {{ .Values.runnerMaintenance.runOnceValue | quote }}
              resources:
                {{- toYaml .Values.runnerMaintenance.resources | nindent 16 }}
          {{- with .Values.runnerMaintenance.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.runnerMaintenance.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.runnerMaintenance.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
{{- end }}
