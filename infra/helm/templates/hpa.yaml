{{- if and .Values.controlPlane.enabled .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "skytest-agent.controlPlaneFullname" . }}
  labels:
    {{- include "skytest-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "skytest-agent.controlPlaneFullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    {{- if .Values.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
{{- if and .Values.browserWorker.enabled .Values.browserWorkerAutoscaling.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "skytest-agent.browserWorkerFullname" . }}
  labels:
    {{- include "skytest-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: browser-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "skytest-agent.browserWorkerFullname" . }}
  minReplicas: {{ .Values.browserWorkerAutoscaling.minReplicas }}
  maxReplicas: {{ .Values.browserWorkerAutoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.browserWorkerAutoscaling.targetCPUUtilizationPercentage }}
    {{- if .Values.browserWorkerAutoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.browserWorkerAutoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
{{- end }}
