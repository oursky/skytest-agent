{{- if .Values.controlPlane.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "skytest-agent.controlPlaneFullname" . }}
  labels:
    {{- include "skytest-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
spec:
  replicas: {{ .Values.controlPlane.replicas }}
  selector:
    matchLabels:
      {{- include "skytest-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: control-plane
  template:
    metadata:
      labels:
        {{- include "skytest-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
      {{- with .Values.controlPlane.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: control-plane
          image: "{{ include "skytest-agent.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            {{- toYaml .Values.controlPlane.command | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.controlPlane.containerPort }}
          env:
            - name: SKYTEST_BROWSER_WORKER
              value: "false"
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecretName }}
          readinessProbe:
            httpGet:
              path: {{ .Values.controlPlane.readinessProbe.path }}
              port: {{ .Values.controlPlane.containerPort }}
            initialDelaySeconds: {{ .Values.controlPlane.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.controlPlane.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.controlPlane.readinessProbe.timeoutSeconds }}
          livenessProbe:
            httpGet:
              path: {{ .Values.controlPlane.livenessProbe.path }}
              port: {{ .Values.controlPlane.containerPort }}
            initialDelaySeconds: {{ .Values.controlPlane.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.controlPlane.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.controlPlane.livenessProbe.timeoutSeconds }}
          resources:
            {{- toYaml .Values.controlPlane.resources | nindent 12 }}
      {{- with .Values.controlPlane.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlPlane.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.controlPlane.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "skytest-agent.controlPlaneFullname" . }}
  labels:
    {{- include "skytest-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
  {{- with .Values.controlPlane.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.controlPlane.service.type }}
  selector:
    {{- include "skytest-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: control-plane
  ports:
    - name: http
      port: {{ .Values.controlPlane.service.port }}
      targetPort: {{ .Values.controlPlane.service.targetPort }}
{{- end }}
