controlPlane:
  replicas: 1
  resources:
    requests:
      cpu: "50m"
      memory: "96Mi"
    limits:
      cpu: "250m"
      memory: "256Mi"

browserWorker:
  replicas: 1
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "2Gi"

runnerMaintenance:
  schedule: "*/5 * * * *"
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "250m"
      memory: "512Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 75
  targetMemoryUtilizationPercentage: 85
